<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Busamania</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }
        .login-card {
            background: var(--secondary-bg);
            padding: 3rem;
            border: 1px solid var(--accent-gold);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-card h2 {
            color: var(--accent-gold);
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <!-- This is a front-end demo admin. Production requires backend. -->
    <div class="login-container">
        <div class="login-card">
            <h2>Admin Area</h2>
            <div class="admin-warning" style="font-size: 0.8rem;">Demo mode: just click Login</div>
            <form id="login-form">
                <div class="form-group" style="text-align: left;">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Any password works for demo" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('admin_logged_in', 'true');
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
